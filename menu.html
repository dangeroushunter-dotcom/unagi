<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>いちのや料理メニュー / Unagi Menu</title>

  <style>
    body {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      background: #111; /* 黒背景 */
      margin: 0;
      color: #e8e4dc;
    }

    header {
      text-align: center;
      background: #000;
      padding: 24px 12px;
      border-bottom: 2px solid #8a3b32;
    }
    header h1 {
      margin: 0;
      font-size: 1.6rem;
      font-weight: normal;
    }
    header .en {
      font-family: sans-serif;
      font-size: 0.85em;
      color: #999;
      display: block;
    }

    /* ===== カテゴリタブ部分 ===== */
    .tabs-wrapper {
      position: sticky;
      top: 0;
      background: #111;
      z-index: 10;
      border-bottom: 1px solid #333;
      transition: all 0.3s ease;
    }

    /* ★チュートリアル1段目：カテゴリをハイライト（明るく）する */
    .tabs-wrapper.highlight-step1 {
      z-index: 100000 !important;
      background: #fff !important; /* 背景を白くして目立たせる */
      box-shadow: 0 0 0 100vh rgba(0,0,0,0.85); /* 周囲を暗転 */
    }
    .tabs-wrapper.highlight-step1 .tab {
      border-color: #8a3b32;
      color: #8a3b32;
      background: #eee;
    }
    .tabs-wrapper.highlight-step1 .tab.active {
      background: #8a3b32;
      color: #fff;
    }

    .tabs {
      display: flex;
      gap: 12px;
      padding: 12px 16px;
      overflow-x: auto;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
      max-width: 1100px;
      margin: 0 auto;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex: 0 0 auto;
      padding: 8px 16px;
      border: 1px solid #555;
      border-radius: 4px;
      background: #222;
      color: #ccc;
      font-size: 0.95rem;
    }
    .tab.active {
      background: #8a3b32;
      color: #fff;
      border-color: #8a3b32;
    }

    /* ===== メニュー項目 ===== */
    .wrap { max-width: 900px; margin: 0 auto; padding: 20px 16px; }

    .menu-item {
      display: flex;
      gap: 24px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 20px;
      margin: 16px 0;
      align-items: center;
    }

    .menu-img {
      flex-shrink: 0;
      width: 200px;
      aspect-ratio: 4 / 3;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 4px;
    }
    .menu-img img { width: 100%; height: 100%; object-fit: contain; }

    /* 画像準備中の表示用 */
    .no-img-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #666;
      font-size: 0.8rem;
      text-align: center;
    }

    .menu-text { flex: 1; }
    .menu-text h2 { margin: 0 0 8px; font-size: 1.4rem; color: #e8e4dc; }
    .cat { background: #333; padding: 4px 10px; font-size: 0.75em; display: inline-block; margin-bottom: 8px; }
    .price-container { margin-top: 12px; }
    .price-line { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
    .price-label { font-size: 0.9rem; color: #888; }
    .price-value { font-weight: bold; color: #d45d50; font-size: 1.2rem; }

    /* ===== チュートリアル表示 ===== */
    #tutorial {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 99999;
      pointer-events: none;
    }
    #tutorial.hidden { display: none; }
    .tut-overlay {
      position: absolute; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      pointer-events: auto;
    }
    .tut-content {
      position: absolute; width: 100%; text-align: center; color: #fff;
      pointer-events: none;
    }
    .tut-btn {
      background: #8a3b32; color: #fff; border: none; padding: 12px 30px;
      border-radius: 4px; margin-top: 20px; cursor: pointer; pointer-events: auto;
    }
    .tut-msg { font-size: 1.1rem; line-height: 1.6; text-shadow: 0 2px 4px #000; animation: bounce 2s infinite; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @media (max-width: 720px) {
      .menu-item { flex-direction: column; }
      .menu-img { width: 100%; aspect-ratio: 16 / 9; }
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="./script.js" defer></script>
</head>

<body>
  <div id="tutorial" class="hidden">
    <div id="tut-overlay" class="tut-overlay"></div>
    
    <div id="tut-step1" class="tut-content">
      <div class="tut-msg">👈 カテゴリは横にスワイプできます 👉</div>
      <button class="tut-btn" id="btn-next">次へ</button>
    </div>

    <div id="tut-step2" class="tut-content hidden" style="top: 50%; transform: translateY(-50%);">
      <div class="tut-msg">👇 下にスクロールして<br>メニューをご覧ください</div>
      <button class="tut-btn" id="btn-close">OK</button>
    </div>
  </div>

  <header id="header"></header>

  <div class="tabs-wrapper" id="tabs-wrapper">
    <div class="tabs" id="tabs"></div>
  </div>
  
  <div class="wrap" id="menu"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const isDone = localStorage.getItem("ichinoya_tut_v2");
      if (isDone) return;

      const tut = document.getElementById("tutorial");
      const overlay = document.getElementById("tut-overlay");
      const wrapper = document.getElementById("tabs-wrapper");
      const step1 = document.getElementById("tut-step1");
      const step2 = document.getElementById("tut-step2");

      tut.classList.remove("hidden");
      // Step1: タブを明るくハイライト
      wrapper.classList.add("highlight-step1");
      overlay.style.background = "transparent"; // wrapperの影で暗くするため

      // メッセージをタブのすぐ下に配置
      setTimeout(() => {
        const rect = wrapper.getBoundingClientRect();
        step1.style.top = (rect.bottom + 30) + "px";
      }, 500);

      document.getElementById("btn-next").addEventListener("click", () => {
        wrapper.classList.remove("highlight-step1");
        overlay.style.background = "rgba(0,0,0,0.8)";
        step1.classList.add("hidden");
        step2.classList.remove("hidden");
      });

      document.getElementById("btn-close").addEventListener("click", () => {
        tut.classList.add("hidden");
        localStorage.setItem("ichinoya_tut_v2", "true");
      });
    });
  </script>
</body>
</html>
