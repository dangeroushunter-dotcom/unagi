<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>いちのや メニュー / Language Select</title>
  <style>
    body {
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
      background: #111; /* 黒背景 */
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      color: #e8e4dc;
      writing-mode: horizontal-tb;
      text-orientation: mixed;
      text-align: center;
      overflow: hidden;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 50px;
      line-height: 1.5;
      font-weight: normal;
    }

    h1 small {
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      font-size: 1.1rem;
      color: #999;
    }

    .btn-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 320px;
      z-index: 1; /* ボタンを手前に */
    }

    .btn {
      display: block;
      padding: 16px 20px;
      border: 1px solid #444;
      border-radius: 4px;
      font-size: 1.2rem;
      cursor: pointer;
      background: #1a1a1a;
      color: #e8e4dc;
      text-decoration: none;
      transition: all 0.3s ease;
      font-family: "Yu Gothic", "Hiragino Sans", sans-serif;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    .btn:hover {
      background: #333;
      border-color: #8a3b32;
    }

    /* ====== ロゴのフェードアウト画面 ====== */
    #splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh; /* スマホのURLバーなどを考慮した全画面 */
      background: #111;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1s ease, visibility 1s ease;
    }

    #splash.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    /* ★ ここを修正：どの画面サイズでも全画面にピッタリ敷き詰める */
    #splash img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 隙間なく全画面を覆う設定 */
      object-position: center; /* 画像の中心を基準にする */
    }

    @media (max-width: 480px) {
      .btn {
        font-size: 1.1rem;
        padding: 14px 0;
      }
    }
  </style>
</head>
<body>

  <div id="splash">
    <img src="./rogo.jpg" alt="いちのや" onerror="this.style.display='none'; this.parentElement.innerHTML='<h2 style=\'color:#e8e4dc;\'>いちのや</h2>';">
  </div>

  <h1>言語を選択してください<br><small>Select Language</small></h1>

  <div class="btn-container">
    <a href="menu.html?lang=jp" class="btn">🇯🇵 日本語メニュー</a>
    <a href="menu.html?lang=en" class="btn">🇺🇸 English Menu</a>
    <a href="menu.html?lang=zh" class="btn">🇨🇳 中文菜单</a>
  </div>

  <script>
    // ページ読み込み後、2秒経ったらロゴをフェードアウト
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('splash').classList.add('fade-out');
      }, 2000);
    });
  </script>
</body>
</html>
